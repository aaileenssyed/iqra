<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQRA ARABIC ACADEMY SYLLABUS</title>
    <style>
        :root {
            --cream: #fdfbf7;
            --brown: #6f4e37;
            --teal: #008080;
            --green: #d4edda;
            --green-text: #155724;
            --orange: #fff3cd;
            --orange-text: #856404;
            --text-dark: #3e2723;
        }

        body {
            background-color: var(--cream);
            color: var(--text-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        header { width: 100%; max-width: 600px; text-align: center; margin-bottom: 20px; }
        h1 { color: var(--brown); font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: var(--teal); font-size: 14px; font-weight: 600; text-transform: uppercase; }
        
        .badge-admin {
            background-color: #f8d7da; color: #721c24; text-align: center;
            padding: 8px; border-radius: 8px; font-weight: bold; display: none; margin-top: 10px;
        }

        .controls { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 12px; border-radius: 10px; border: 1px solid rgba(111, 78, 55, 0.2); font-size: 16px; box-sizing: border-box; width: 100%; }
        select, input { background-color: white; }
        
        button { background-color: var(--brown); color: white; font-weight: bold; border: none; cursor: pointer; }
        button.teal-btn { background-color: var(--teal); }
        button:active { opacity: 0.8; }

        .tabs { display: flex; width: 100%; max-width: 600px; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: rgba(111, 78, 55, 0.1); border-radius: 8px; font-weight: 600; cursor: pointer; }
        .tab.active { background: var(--brown); color: white; }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 12px; }

        .card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 14px; padding: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 6px solid var(--teal);
        }

        .card.completed { border-left-color: #4caf50; background: var(--green); color: var(--green-text); }
        .card.upcoming { border-left-color: #ff9800; background: var(--orange); color: var(--orange-text); }
        .card h3 { margin: 0 0 8px 0; font-size: 18px; }
        .card p { margin: 4px 0; font-size: 14px; }
        
        .notes-link { display: inline-block; margin-top: 8px; color: var(--teal); font-weight: 600; text-decoration: none; }
        .admin-actions { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); display: flex; gap: 8px; }
        .admin-actions button { padding: 6px; font-size: 12px; }

        .form-group {
            display: flex; flex-direction: column; gap: 8px; background: rgba(255, 255, 255, 0.8);
            padding: 15px; border-radius: 12px; border: 1px dashed var(--teal); margin-bottom: 15px;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--cream); padding: 20px; border-radius: 12px; width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>IQRA ARABIC ACADEMY</h1>
        <div class="subtitle">Syllabus & Results Portal</div>
        <div id="adminBadge" class="badge-admin">ADMIN MODE ACTIVE</div>
    </header>

    <div class="controls">
        <button id="toggleModeBtn" class="teal-btn" onclick="openPasscodeModal()">Switch to Admin Mode</button>
        
        <label style="font-weight: 600; font-size: 14px; margin-top: 5px;">Select Class:</label>
        <select id="classSelect" onchange="renderActiveView()">
            <option value="">Loading Classes...</option>
        </select>

        <div id="studentFilterArea">
            <label style="font-weight: 600; font-size: 14px;">Enter Student ID to fetch marks:</label>
            <input type="text" id="studentIdInput" placeholder="e.g., Student_01" oninput="renderActiveView()">
        </div>
    </div>

    <div class="tabs">
        <div id="tabSyllabus" class="tab active" onclick="switchTab('syllabus')">Syllabus</div>
        <div id="tabResults" class="tab" onclick="switchTab('results')">Results Log</div>
    </div>

    <div id="mainContainer" class="container"></div>

    <div id="passcodeModal" class="modal">
        <div class="modal-content">
            <h3 style="margin:0; color:var(--brown);">Enter Admin Passcode</h3>
            <input type="password" id="passcodeField" placeholder="Enter Code">
            <button onclick="verifyAdminPasscode()">Verify</button>
            <button style="background:grey;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyyovsPOWM3JMw5EaRKGxDdm2dw4swymSyewSVjfsXdEqhoqejK_vnvsKWZk4tiTD89/exec'; 
        
        let appData = { classes: [], syllabus: [] };
        let currentMode = 'viewer'; 
        let currentTab = 'syllabus'; 
        let enteredPasscode = '';

        async function fetchAllData() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = "<p style='text-align:center;'>Syncing live data from Google Sheets...</p>";
            try {
                const response = await fetch(API_URL);
                appData = await response.json();
                populateClassDropdown();
                renderActiveView();
            } catch (error) {
                container.innerHTML = "<p style='color:red; text-align:center;'>Connection Error. Verify script setup.</p>";
            }
        }

        function populateClassDropdown() {
            const select = document.getElementById('classSelect');
            const cachedValue = select.value;
            select.innerHTML = appData.classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            if(cachedValue && select.querySelector(`option[value="${cachedValue}"]`)) {
                select.value = cachedValue;
            }
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.getElementById('tabSyllabus').classList.toggle('active', tabName === 'syllabus');
            document.getElementById('tabResults').classList.toggle('active', tabName === 'results');
            renderActiveView();
        }

        function openPasscodeModal() {
            if (currentMode === 'admin') {
                currentMode = 'viewer';
                enteredPasscode = '';
                document.getElementById('adminBadge').style.display = 'none';
                document.getElementById('studentFilterArea').style.display = 'block';
                document.getElementById('toggleModeBtn').textContent = "Switch to Admin Mode";
                renderActiveView();
            } else {
                document.getElementById('passcodeModal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('passcodeModal').style.display = 'none';
            document.getElementById('passcodeField').value = '';
        }

        function verifyAdminPasscode() {
            const code = document.getElementById('passcodeField').value;
            if (code === "1234") {
                currentMode = 'admin';
                enteredPasscode = code;
                document.getElementById('adminBadge').style.display = 'block';
                document.getElementById('studentFilterArea').style.display = 'none';
                document.getElementById('toggleModeBtn').textContent = "Exit Admin Mode";
                closeModal();
                renderActiveView();
            } else {
                alert("Incorrect Admin Credentials.");
            }
        }

        function renderActiveView() {
            const selectedClass = document.getElementById('classSelect').value;
            const container = document.getElementById('mainContainer');
            if (!selectedClass) return;

            const classItems = appData.syllabus.filter(item => item.classId === selectedClass);

            if (currentTab === 'syllabus') {
                const syllabusItems = classItems.filter(item => !item.studentId);
                
                let htmlOutput = '';
                
                // Form to add a new syllabus item (only visible to admin)
                if (currentMode === 'admin') {
                    htmlOutput += `
                        <div class="form-group">
                            <h4 style="margin:0 0 5px 0; color:var(--brown);">➕ Add New Syllabus Topic</h4>
                            <input type="text" id="newSubject" placeholder="Subject (e.g., Arabic 101)">
                            <input type="text" id="newChapter" placeholder="Chapter (e.g., Chapter 3)">
                            <input type="text" id="newTopic" placeholder="Topic Title (e.g., Sun & Moon Letters)">
                            <input type="text" id="newNotesLink" placeholder="Link to Notes/Drive Google Doc (Optional)">
                            <button class="teal-btn" onclick="submitSyllabusForm()">Save Topic to Sheet</button>
                        </div>
                        <h3 style="margin-top:15px; font-size:16px; border-bottom:1px solid var(--brown); padding-bottom:5px;">Syllabus Breakdown:</h3>
                    `;
                }

                if(syllabusItems.length === 0) {
                    htmlOutput += "<p style='text-align:center; font-style:italic;'>No syllabus items configured for this class yet.</p>";
                } else {
                    htmlOutput += syllabusItems.map(item => {
                        let statusClass = item.status ? item.status.toLowerCase() : '';
                        return `
                            <div class="card ${statusClass}">
                                <div style="font-size:11px; text-transform:uppercase; font-weight:bold; color:var(--teal);">${item.subject}</div>
                                <h3>${item.chapter}: ${item.topic}</h3>
                                <p><strong>Status:</strong> ${item.status || 'Pending'}</p>
                                ${item.comments ? `<p><strong>Teacher Note:</strong> ${item.comments}</p>` : ''}
                                ${item.notesLink ? `<a class="notes-link" href="${item.notesLink}" target="_blank">📚 View Lesson Notes</a>` : ''}
                                
                                ${currentMode === 'admin' ? `
                                    <div class="admin-actions">
                                        <button style="background-color:#4caf50;" onclick="changeSyllabusStatus(${item.rowIndex}, 'Completed')">Done</button>
                                        <button style="background-color:#ff9800;" onclick="changeSyllabusStatus(${item.rowIndex}, 'Upcoming')">Upcoming</button>
                                        <button style="background-color:grey;" onclick="promptComment(${item.rowIndex}, '${item.comments || ''}')">Add Note</button>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    }).join('');
                }
                container.innerHTML = htmlOutput;
            } else {
                if (currentMode === 'admin') {
                    const markRecords = classItems.filter(item => item.studentId !== '');
                    
                    let htmlOutput = `
                        <div class="form-group">
                            <h4 style="margin:0 0 5px 0; color:var(--brown);">📝 Submit New Student Marks</h4>
                            <input type="text" id="newStudentId" placeholder="Student ID (e.g., Student_01)">
                            <input type="text" id="newAssessName" placeholder="Assessment/Exam Name (e.g., Quiz 1)">
                            <input type="text" id="newMarks" placeholder="Score (e.g., 95/100 or A+)">
                            <button class="teal-btn" onclick="submitMarksForm()">Save Entry to Sheet</button>
                        </div>
                        <h3 style="margin-top:15px; font-size:16px; border-bottom:1px solid var(--brown); padding-bottom:5px;">All Student Results:</h3>
                    `;

                    if(markRecords.length === 0) {
                        htmlOutput += "<p style='text-align:center; font-style:italic;'>No results uploaded for this class yet.</p>";
                    } else {
                        htmlOutput += markRecords.map(m => `
                            <div class="card" style="border-left-color: var(--brown);">
                                <h3>ID: ${m.studentId}</h3>
                                <p><strong>Exam/Task:</strong> ${m.subject}</p>
                                <p><strong>Score:</strong> <span style="color:var(--teal); font-weight:bold; font-size:16px;">${m.marks}</span></p>
                            </div>
                        `).join('');
                    }
                    container.innerHTML = htmlOutput;
                } else {
                    const typedId = document.getElementById('studentIdInput').value.trim();
                    if (!typedId) {
                        container.innerHTML = "<p style='text-align:center; font-style:italic; margin-top:20px;'>Please enter your unique Student ID in the box above to fetch your results.</p>";
                        return;
                    }

                    const individualMarks = classItems.filter(item => item.studentId && item.studentId.toLowerCase() === typedId.toLowerCase());
                    
                    if(individualMarks.length === 0) {
                        container.innerHTML = `<p style='text-align:center; color:var(--brown);'>No recorded entries located for Student ID: <strong>${typedId}</strong> in this class section.</p>`;
                        return;
                    }

                    container.innerHTML = `<h3 style='font-size:16px;'>Report Card for ${typedId}:</h3>` + individualMarks.map(m => `
                        <div class="card" style="border-left-color: var(--teal); background: white;">
                            <div style="font-size:11px; color:grey; font-weight:bold; text-transform:uppercase;">Score Report</div>
                            <h3 style="margin: 5px 0;">${m.subject}</h3>
                            <p style="margin:0; font-size:15px;">Result: <span style="font-size:18px; color:var(--teal); font-weight:bold;">${m.marks}</span></p>
                        </div>
                    `).join('');
                }
            }
        }

        async function changeSyllabusStatus(rowIndex, nextStatus) {
            executeSpreadsheetMutation({
                action: 'updateStatus',
                rowIndex: rowIndex,
                status: nextStatus,
                comments: appData.syllabus.find(i => i.rowIndex === rowIndex).comments
            });
        }

        async function promptComment(rowIndex, activeComment) {
            const newComment = prompt("Update operational syllabus note:", activeComment);
            if (newComment === null) return;
            executeSpreadsheetMutation({
                action: 'updateStatus',
                rowIndex: rowIndex,
                status: appData.syllabus.find(i => i.rowIndex === rowIndex).status,
                comments: newComment
            });
        }

        async function submitSyllabusForm() {
            const classId = document.getElementById('classSelect').value;
            const subject = document.getElementById('newSubject').value.trim();
            const chapter = document.getElementById('newChapter').value.trim();
            const topic = document.getElementById('newTopic').value.trim();
            const notesLink = document.getElementById('newNotesLink').value.trim();

            if(!subject || !chapter || !topic) {
                alert("Please fill out Subject, Chapter, and Topic fields.");
                return;
            }

            executeSpreadsheetMutation({
                action: 'addSyllabus',
                classId: classId,
                subject: subject,
                chapter: chapter,
                topic: topic,
                notesLink: notesLink
            });
        }

        async function submitMarksForm() {
            const classId = document.getElementById('classSelect').value;
            const studentId = document.getElementById('newStudentId').value.trim();
            const assessmentName = document.getElementById('newAssessName').value.trim();
            const marks = document.getElementById('newMarks').value.trim();

            if(!studentId || !assessmentName || !marks) {
                alert("Please complete all input boxes before saving.");
                return;
            }

            executeSpreadsheetMutation({
                action: 'addResult',
                classId: classId,
                studentId: studentId,
                assessmentName: assessmentName,
                marks: marks
            });
        }

        async function executeSpreadsheetMutation(payload) {
            payload.passcode = enteredPasscode;
            const container = document.getElementById('mainContainer');
            container.innerHTML = "<p style='text-align:center;'>Saving data to your Google Sheet backend...</p>";

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                setTimeout(fetchAllData, 1500); 
            } catch(e) {
                alert("Error writing updates to spreadsheet.");
                fetchAllData();
            }
        }

        window.onload = fetchAllData;
    </script>
</body>
</html>
